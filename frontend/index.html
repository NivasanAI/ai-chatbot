<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Chat — Excel Powered</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #111118; --card: #16161f; --border: #2a2a3a;
    --accent: #7c6aff; --accent2: #ff6a9b; --text: #e8e8f0; --muted: #6b6b85;
    --user-bg: #1e1a3a; --bot-bg: #161622; --glow: rgba(124,106,255,0.15);
  }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
  body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 60% 40% at 20% 10%, rgba(124,106,255,0.08) 0%, transparent 60%), radial-gradient(ellipse 40% 50% at 80% 80%, rgba(255,106,155,0.06) 0%, transparent 60%); pointer-events: none; z-index: 0; }

  /* HEADER */
  header { position: relative; z-index: 10; padding: 18px 28px; border-bottom: 1px solid var(--border); background: rgba(10,10,15,0.9); backdrop-filter: blur(12px); display: flex; align-items: center; justify-content: space-between; gap: 16px; }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; box-shadow: 0 0 20px var(--glow); }
  .logo-text { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.1rem; letter-spacing: -0.02em; }
  .logo-sub { font-size: 0.65rem; color: var(--muted); margin-top: 2px; letter-spacing: 0.08em; text-transform: uppercase; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.6); animation: pulse 2s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .session-badge { font-size: 0.65rem; color: var(--muted); background: var(--card); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; letter-spacing: 0.05em; }
  .kb-btn { font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--accent); background: transparent; border: 1px solid var(--accent); padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em; }
  .kb-btn:hover { background: var(--glow); box-shadow: 0 0 12px var(--glow); }

  /* MAIN */
  .main { flex: 1; display: flex; overflow: hidden; position: relative; z-index: 1; }

  /* MESSAGES */
  .messages-wrap { flex: 1; overflow-y: auto; padding: 28px 20px; scroll-behavior: smooth; display: flex; flex-direction: column; gap: 6px; }
  .messages-wrap::-webkit-scrollbar { width: 4px; }
  .messages-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .msg-row { display: flex; align-items: flex-end; gap: 10px; animation: fadeUp 0.3s ease both; max-width: 760px; width: 100%; margin: 0 auto; }
  .msg-row.user { flex-direction: row-reverse; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .avatar { width: 30px; height: 30px; flex-shrink: 0; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; }
  .avatar.bot { background: linear-gradient(135deg, var(--accent), var(--accent2)); box-shadow: 0 0 12px var(--glow); }
  .avatar.user { background: var(--card); border: 1px solid var(--border); }
  .bubble { max-width: 72%; padding: 12px 16px; border-radius: 14px; font-size: 0.82rem; line-height: 1.65; position: relative; }
  .bubble.bot { background: var(--bot-bg); border: 1px solid var(--border); border-bottom-left-radius: 4px; color: var(--text); }
  .bubble.user { background: var(--user-bg); border: 1px solid rgba(124,106,255,0.3); border-bottom-right-radius: 4px; color: #c8c0ff; }
  .bubble-time { font-size: 0.6rem; color: var(--muted); margin-top: 6px; letter-spacing: 0.04em; }

  /* MARKDOWN (ChatGPT style) */
  .md { font-family: 'Segoe UI', system-ui, sans-serif; font-size: 0.88rem; line-height: 1.75; color: var(--text); }
  .md p { margin: 0 0 10px; }
  .md p:last-child { margin-bottom: 0; }
  .md strong { color: #fff; font-weight: 600; }
  .md em { color: #c8c0ff; font-style: italic; }
  .md h1, .md h2, .md h3 { font-family: 'Syne', sans-serif; font-weight: 700; margin: 14px 0 6px; color: #fff; }
  .md h1 { font-size: 1.1rem; } .md h2 { font-size: 1rem; } .md h3 { font-size: 0.92rem; }
  .md ul, .md ol { margin: 6px 0 10px 0; padding-left: 22px; }
  .md li { margin-bottom: 5px; }
  .md ul li { list-style-type: disc; }
  .md ol li { list-style-type: decimal; }
  .md code { background: rgba(255,255,255,0.08); border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px; font-family: 'DM Mono', monospace; font-size: 0.8rem; color: #a8d8b9; }
  .md pre { background: #0d0d14; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; overflow-x: auto; margin: 10px 0; position: relative; }
  .md pre code { background: none; border: none; padding: 0; font-size: 0.8rem; color: #a8d8b9; }
  .md blockquote { border-left: 3px solid var(--accent); margin: 8px 0; padding: 6px 14px; background: rgba(124,106,255,0.06); border-radius: 0 8px 8px 0; color: var(--muted); }
  .md table { width: 100%; border-collapse: collapse; margin: 10px 0; font-size: 0.8rem; }
  .md th { background: rgba(124,106,255,0.15); color: var(--accent); padding: 7px 12px; text-align: left; border: 1px solid var(--border); }
  .md td { padding: 6px 12px; border: 1px solid var(--border); }
  .md tr:nth-child(even) td { background: rgba(255,255,255,0.02); }
  .md a { color: var(--accent); text-decoration: underline; }
  .md hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }
  .code-block-wrap { position: relative; }
  .copy-btn { position: absolute; top: 8px; right: 8px; background: var(--card); border: 1px solid var(--border); border-radius: 5px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 0.65rem; padding: 3px 8px; cursor: pointer; transition: all 0.2s; }
  .copy-btn:hover { color: var(--text); border-color: var(--accent); }

  /* WIKI BADGE */
  .wiki-badge { display: inline-block; margin-top: 8px; font-size: 0.65rem; color: var(--accent); background: rgba(124,106,255,0.1); border: 1px solid rgba(124,106,255,0.25); padding: 3px 10px; border-radius: 20px; text-decoration: none; letter-spacing: 0.03em; transition: all 0.2s; }
  .wiki-badge:hover { background: var(--glow); border-color: var(--accent); }

  /* TYPING */
  .typing-row { align-items: center; }
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 12px 16px; background: var(--bot-bg); border: 1px solid var(--border); border-radius: 14px; border-bottom-left-radius: 4px; }
  .typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }

  /* EMPTY STATE */
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; text-align: center; padding: 40px 20px; max-width: 400px; margin: 0 auto; animation: fadeUp 0.5s ease both; }
  .empty-icon { width: 60px; height: 60px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 18px; display: flex; align-items: center; justify-content: center; font-size: 28px; box-shadow: 0 0 30px var(--glow); }
  .empty-state h2 { font-family: 'Syne', sans-serif; font-size: 1.3rem; font-weight: 700; }
  .empty-state p { font-size: 0.78rem; color: var(--muted); line-height: 1.6; }
  .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px; }
  .suggestion-chip { font-family: 'DM Mono', monospace; font-size: 0.72rem; padding: 7px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 20px; cursor: pointer; color: var(--muted); transition: all 0.2s; }
  .suggestion-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--glow); }

  /* INPUT */
  .input-area { position: relative; z-index: 10; padding: 16px 20px 20px; border-top: 1px solid var(--border); background: rgba(10,10,15,0.95); backdrop-filter: blur(12px); }
  .input-inner { max-width: 760px; margin: 0 auto; display: flex; align-items: flex-end; gap: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 10px 12px; transition: border-color 0.2s, box-shadow 0.2s; }
  .input-inner:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px var(--glow); }
  textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.82rem; resize: none; line-height: 1.5; max-height: 120px; min-height: 22px; }
  textarea::placeholder { color: var(--muted); }
  .send-btn { width: 36px; height: 36px; flex-shrink: 0; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; box-shadow: 0 0 14px var(--glow); }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--glow); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 15px; height: 15px; fill: white; }
  .input-hint { text-align: center; font-size: 0.6rem; color: var(--muted); margin-top: 8px; letter-spacing: 0.04em; }

  /* KB PANEL */
  .kb-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; backdrop-filter: blur(4px); animation: fadeIn 0.2s ease; }
  .kb-overlay.open { display: flex; align-items: center; justify-content: center; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .kb-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; width: 90%; max-width: 540px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .kb-header { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .kb-header h3 { font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700; }
  .kb-close { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 1.2rem; transition: color 0.2s; }
  .kb-close:hover { color: var(--text); }
  .kb-body { flex: 1; overflow-y: auto; padding: 16px 24px; }
  .kb-body::-webkit-scrollbar { width: 4px; }
  .kb-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .kb-entry { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
  .kb-entry-info { flex: 1; min-width: 0; }
  .kb-topic { font-size: 0.72rem; color: var(--accent); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .kb-content { font-size: 0.78rem; color: var(--text); line-height: 1.5; }
  .kb-delete { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 14px; flex-shrink: 0; transition: color 0.2s; }
  .kb-delete:hover { color: var(--accent2); }
  .kb-add-form { display: flex; flex-direction: column; gap: 8px; padding: 12px 24px 20px; }
  .kb-add-form input, .kb-add-form textarea { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.78rem; outline: none; resize: none; transition: border-color 0.2s; }
  .kb-add-form input:focus, .kb-add-form textarea:focus { border-color: var(--accent); }
  .kb-add-form input::placeholder, .kb-add-form textarea::placeholder { color: var(--muted); }
  .kb-add-btn { font-family: 'DM Mono', monospace; font-size: 0.75rem; color: white; background: linear-gradient(135deg, var(--accent), var(--accent2)); border: none; border-radius: 8px; padding: 9px; cursor: pointer; font-weight: 500; transition: opacity 0.2s; }
  .kb-add-btn:hover { opacity: 0.9; }

  .error-toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #3d1a1a; border: 1px solid #7f2020; color: #ffaaaa; padding: 10px 20px; border-radius: 8px; font-size: 0.75rem; z-index: 200; animation: fadeUp 0.3s ease; display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div>
      <div class="logo-text">ExcelChat AI</div>
      <div class="logo-sub">Powered by Claude · Excel DB</div>
    </div>
  </div>
  <div class="header-right">
    <div class="status-dot"></div>
    <div class="session-badge" id="sessionBadge">session: —</div>
    <button class="kb-btn" onclick="openKB()">⚡ Knowledge Base</button>
  </div>
</header>

<div class="main">
  <div class="messages-wrap" id="messagesWrap">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">✦</div>
      <h2>What can I help with?</h2>
      <p>I'm powered by Claude AI and use your Excel file as a knowledge base. Ask me anything!</p>
      <div class="suggestions">
        <div class="suggestion-chip" onclick="sendSuggestion('What are your support hours?')">Support hours?</div>
        <div class="suggestion-chip" onclick="sendSuggestion('How can I contact you?')">Contact info</div>
        <div class="suggestion-chip" onclick="sendSuggestion('Tell me about your company')">About company</div>
        <div class="suggestion-chip" onclick="sendSuggestion('Explain Python in bullet points')">Python overview</div>
      </div>
    </div>
  </div>
</div>

<div class="input-area">
  <div class="input-inner">
    <textarea id="msgInput" rows="1" placeholder="Type your message… (Enter to send)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for new line</div>
</div>

<!-- Knowledge Base Panel -->
<div class="kb-overlay" id="kbOverlay" onclick="closeKBOnBg(event)">
  <div class="kb-panel">
    <div class="kb-header">
      <h3>⚡ Knowledge Base</h3>
      <button class="kb-close" onclick="closeKB()">✕</button>
    </div>
    <div class="kb-body" id="kbBody">
      <p style="color: var(--muted); font-size: 0.78rem;">Loading…</p>
    </div>
    <div class="kb-add-form">
      <input type="text" id="kbTopic" placeholder="Topic (e.g. pricing)" />
      <textarea id="kbContent" rows="2" placeholder="Content (e.g. Our pricing starts at $49/mo…)"></textarea>
      <button class="kb-add-btn" onclick="addKBEntry()">＋ Add Entry</button>
    </div>
  </div>
</div>

<div class="error-toast" id="errorToast"></div>

<script>
  const API_BASE = "http://localhost:8000";
  let sessionId = "session_" + Math.random().toString(36).slice(2, 10);
  document.getElementById("sessionBadge").textContent = "session: " + sessionId.slice(8);

  let isLoading = false;
  const wrap = document.getElementById("messagesWrap");
  const input = document.getElementById("msgInput");
  const sendBtn = document.getElementById("sendBtn");

  // Configure marked
  marked.setOptions({ breaks: true, gfm: true });

  // Auto-resize textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = Math.min(input.scrollHeight, 120) + "px";
  });
  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function hideEmpty() {
    const e = document.getElementById("emptyState");
    if (e) e.remove();
  }

  function now() {
    return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  }

  function escapeHtml(text) {
    return text.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function renderMarkdown(text) {
    let html = marked.parse(text);
    // Add copy button to code blocks
    html = html.replace(/<pre><code([^>]*)>([\s\S]*?)<\/code><\/pre>/g, (match, attrs, code) => {
      return `<div class="code-block-wrap"><pre><code${attrs}>${code}</code></pre><button class="copy-btn" onclick="copyCode(this)">copy</button></div>`;
    });
    return html;
  }

  function copyCode(btn) {
    const code = btn.previousElementSibling.querySelector("code").innerText;
    navigator.clipboard.writeText(code).then(() => {
      btn.textContent = "copied!";
      setTimeout(() => btn.textContent = "copy", 2000);
    });
  }

  function appendMessage(role, text, wikiTitle = "", wikiUrl = "") {
    hideEmpty();
    const row = document.createElement("div");
    row.className = "msg-row " + role;

    const avatar = document.createElement("div");
    avatar.className = "avatar " + (role === "user" ? "user" : "bot");
    avatar.textContent = role === "user" ? "👤" : "✦";

    const wikiBadge = (role !== "user" && wikiTitle && wikiUrl)
      ? `<a href="${wikiUrl}" target="_blank" class="wiki-badge">📖 Wikipedia: ${escapeHtml(wikiTitle)}</a>`
      : "";

    const bubble = document.createElement("div");
    bubble.className = "bubble " + (role === "user" ? "user" : "bot");

    const bodyHtml = role === "user"
      ? `<div>${escapeHtml(text).replace(/\n/g, "<br>")}</div>`
      : `<div class="md">${renderMarkdown(text)}</div>`;

    bubble.innerHTML = `${bodyHtml}${wikiBadge}<div class="bubble-time">${now()}</div>`;

    row.appendChild(avatar);
    row.appendChild(bubble);
    wrap.appendChild(row);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function showTyping() {
    hideEmpty();
    const row = document.createElement("div");
    row.className = "msg-row bot typing-row";
    row.id = "typingIndicator";
    const avatar = document.createElement("div");
    avatar.className = "avatar bot";
    avatar.textContent = "✦";
    const dots = document.createElement("div");
    dots.className = "typing-dots";
    dots.innerHTML = "<span></span><span></span><span></span>";
    row.appendChild(avatar);
    row.appendChild(dots);
    wrap.appendChild(row);
    wrap.scrollTop = wrap.scrollHeight;
  }

  function hideTyping() {
    const t = document.getElementById("typingIndicator");
    if (t) t.remove();
  }

  function showError(msg) {
    const toast = document.getElementById("errorToast");
    toast.textContent = msg;
    toast.style.display = "block";
    setTimeout(() => { toast.style.display = "none"; }, 4000);
  }

  async function sendMessage() {
    const text = input.value.trim();
    if (!text || isLoading) return;
    isLoading = true;
    sendBtn.disabled = true;
    input.value = "";
    input.style.height = "auto";
    appendMessage("user", text);
    showTyping();
    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      if (!res.ok) throw new Error("API error " + res.status);
      const data = await res.json();
      hideTyping();
      appendMessage("assistant", data.reply, data.wikipedia_title, data.wikipedia_url);
    } catch (err) {
      hideTyping();
      showError("⚠ Could not reach the backend. Is the server running?");
      appendMessage("assistant", "Sorry, I couldn't connect to the server. Please check that the backend is running.");
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      input.focus();
    }
  }

  function sendSuggestion(text) { input.value = text; sendMessage(); }

  async function openKB() {
    document.getElementById("kbOverlay").classList.add("open");
    await loadKB();
  }
  function closeKB() { document.getElementById("kbOverlay").classList.remove("open"); }
  function closeKBOnBg(e) { if (e.target === document.getElementById("kbOverlay")) closeKB(); }

  async function loadKB() {
    const body = document.getElementById("kbBody");
    body.innerHTML = '<p style="color:var(--muted);font-size:0.78rem;">Loading…</p>';
    try {
      const res = await fetch(`${API_BASE}/knowledge`);
      const data = await res.json();
      body.innerHTML = "";
      if (!data.entries.length) {
        body.innerHTML = '<p style="color:var(--muted);font-size:0.78rem;">No entries yet. Add one below.</p>';
        return;
      }
      data.entries.forEach(entry => {
        const div = document.createElement("div");
        div.className = "kb-entry";
        div.innerHTML = `<div class="kb-entry-info"><div class="kb-topic">${escapeHtml(entry.topic)}</div><div class="kb-content">${escapeHtml(entry.content)}</div></div><button class="kb-delete" onclick="deleteKB('${escapeHtml(entry.topic)}')">✕</button>`;
        body.appendChild(div);
      });
    } catch {
      body.innerHTML = '<p style="color:#ff6a9b;font-size:0.78rem;">Failed to load. Is the backend running?</p>';
    }
  }

  async function addKBEntry() {
    const topic = document.getElementById("kbTopic").value.trim();
    const content = document.getElementById("kbContent").value.trim();
    if (!topic || !content) return;
    try {
      await fetch(`${API_BASE}/knowledge`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ topic, content }) });
      document.getElementById("kbTopic").value = "";
      document.getElementById("kbContent").value = "";
      await loadKB();
    } catch { showError("Failed to add entry."); }
  }

  async function deleteKB(topic) {
    try {
      await fetch(`${API_BASE}/knowledge/${encodeURIComponent(topic)}`, { method: "DELETE" });
      await loadKB();
    } catch { showError("Failed to delete entry."); }
  }
</script>
</body>
</html>
